name: AI Code Review (GigaChat)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
  push:
    branches:
      - demo-check-b

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Context
        id: context
        run: |
          set -euo pipefail

          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          BASE_REF="${{ github.base_ref }}"
          BASE_REF=${BASE_REF:-$DEFAULT_BRANCH}

          git fetch origin $BASE_REF

          DIFF=$(git diff origin/$BASE_REF...HEAD -- \
            '*.py' '*.js' '*.ts' '*.jsx' '*.tsx' '*.go' '*.rs' '*.java' \
            '*.kt' '*.cpp' '*.c' '*.hpp' '*.h' '*.rb' '*.php' '*.swift' \
            '*.css' '*.html' '*.json' '*.yaml' '*.yml' '*.toml' '*.sql' '*.sh' | head -c 10000)

          COMMITS=$(git log origin/$BASE_REF..HEAD --pretty=format:"- %s (%h)" | head -10)
          
          # Номер тикета из тела PR (#123, PROJ-456 и т.п.)
          PR_BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?<=#)\d+' | head -1 || echo "")
          
          # Кодируем в base64 для безопасной передачи между шагами
          echo "diff_b64=$(echo -n "$DIFF" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "commits_b64=$(echo -n "$COMMITS" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "ticket_b64=$(echo -n "$PR_BODY" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Fetch Issue Description
        id: ticket
        if: steps.context.outputs.issue_num != ''
        run: |
          set -euo pipefail
          ISSUE_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.issue_num }}")
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
          echo "issue_body_b64=$(echo -n "$ISSUE_BODY" | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Call GigaChat
        id: llm
        env:
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
        run: |
          set -euo pipefail
          
          # Декодируем контекст из base64
          DIFF=$(echo "${{ steps.context.outputs.diff_b64 }}" | base64 -d)
          COMMITS=$(echo "${{ steps.context.outputs.commits_b64 }}" | base64 -d)
          TICKET="${{ steps.ticket.outputs.issue_body_b64 }}" && TICKET=$(echo "$TICKET" | base64 -d)
          [ -z "$TICKET" ] && TICKET="${{ steps.context.outputs.ticket_b64 }}" && TICKET=$(echo "$TICKET" | base64 -d)
          [ -z "$TICKET" ] && TICKET="Задача не указана"
          
          # Формируем промпт для code review
          PROMPT="Ты Senior Code Reviewer. Анализируй код строго по задаче.
          
          ЗАДАЧА:
          $TICKET

          КОММИТЫ:
          $COMMITS

          ДИФФ:
          $DIFF

          ИНСТРУКЦИЯ:
          1. Соответствует ли код задаче?
          2. Найди баги, уязвимости, проблемы производительности.
          3. Предложи конкретные исправления с примерами кода.
          4. Отвечай на русском, в формате Markdown.
          5. Не выдумывай файлы или строки, которых нет в диффе."

          AUTH_RESPONSE=$(curl -s --http1.1 -k -X POST \
          "https://ngw.devices.sberbank.ru:9443/api/v2/oauth" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -H "Accept: application/json" \
          -H "RqUID: ${GITHUB_RUN_ID:-test}" \
          -H "Authorization: Basic $GIGACHAT_AUTH_KEY" \
          --data-urlencode "scope=GIGACHAT_API_PERS")
          
          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.access_token // empty')
          
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Auth failed: $AUTH_RESPONSE" >&2
            REVIEW="Ошибка аутентификации GigaChat. Проверьте GIGACHAT_AUTH_KEY."
          else
            # Вызов чата с полученным токеном
            CHAT_RESPONSE=$(curl -s --http1.1 -k -X POST \
              "https://gigachat.devices.sberbank.ru/api/v1/chat/completions" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              --insecure \
              -d "{
                \"model\": \"GigaChat:latest\",
                \"messages\": [
                  {\"role\": \"system\", \"content\": \"Ты строгий senior code reviewer. Отвечай по делу, без воды. Если код плохой — говори прямо.\"},
                  {\"role\": \"user\", \"content\": $(echo "$PROMPT" | jq -Rs .)}
                ],
                \"max_tokens\": 2000,
                \"temperature\": 0.2,
                \"repetition_penalty\": 1.1
              }")
            
            # Парсим ответ
            REVIEW=$(echo "$CHAT_RESPONSE" | jq -r '.choices[0].message.content // "Пустой ответ от модели"')
            
            # Логирование для отладки
            echo "GigaChat responded" >&2
          fi
          
          # Сохраняем результат в GITHUB_OUTPUT (экранируем спецсимволы)
          {
            echo "review<<GITHUB_OUTPUT_EOF"
            echo "$REVIEW"
            echo "GITHUB_OUTPUT_EOF"
          } >> $GITHUB_OUTPUT

      - name: Post Review to PR & Issue
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.llm.outputs.review }}`;
            const prNum = context.issue.number;
            const issueNumRaw = `${{ steps.context.outputs.issue_num }}`;
            
            const body = `**GigaChat Code Review**\n\n${review}`;
            
            // comment in PR
            if (prNum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body
              });
            }
            
            // comment in issue only if valid
            const issueNum = parseInt(issueNumRaw);
            if (!isNaN(issueNum) && issueNum !== prNum) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  body: `**GigaChat Review (PR #${prNum})**\n\n${review}`
                });
              } catch (e) {
                core.warning(`Issue ${issueNum} not found, skipping`);
              }
            }