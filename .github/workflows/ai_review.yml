name: LLM Commit Review

on:
  push:
    branches:
      - demo-check-b

jobs:
  llm_commit_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Gather latest commits
        run: git log -n 5 --pretty=format:"%s%n%b" > commit_messages.txt

      - name: Run LLM review
        env:
          OPENAI_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: python scripts/llm_review.py \
              --commit-messages commit_messages.txt \
              --branch ${{ github.ref_name }} \
              --repo ${{ github.repository }}