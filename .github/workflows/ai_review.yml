name: AI Code Review (YandexGPT)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Context
        id: context
        run: |
          set -euo pipefail
          
          # Дифф (только код)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- \
            '*.py' '*.js' '*.ts' '*.jsx' '*.tsx' '*.go' '*.rs' '*.java' \
            '*.kt' '*.cpp' '*.c' '*.hpp' '*.h' '*.rb' '*.php' '*.swift' \
            '*.css' '*.html' '*.json' '*.yaml' '*.yml' '*.toml' '*.sql' '*.sh' | head -c 10000)
          
          # Коммиты
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"- %s (%h)" | head -10)
          
          # Номер тикета из тела PR
          PR_BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?<=#)\d+' | head -1 || echo "")
          
          # Кодируем в base64 для безопасной передачи
          echo "diff_b64=$(echo -n "$DIFF" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "commits_b64=$(echo -n "$COMMITS" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "ticket_b64=$(echo -n "$PR_BODY" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Fetch Issue (if exists)
        id: ticket
        if: steps.context.outputs.issue_num != ''
        run: |
          set -euo pipefail
          ISSUE_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.issue_num }}")
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
          echo "issue_body_b64=$(echo -n "$ISSUE_BODY" | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Call YandexGPT
        id: llm
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEXGPT_API_KEY }}
        run: |
          set -euo pipefail
          
          # Декодируем base64
          DIFF=$(echo "${{ steps.context.outputs.diff_b64 }}" | base64 -d)
          COMMITS=$(echo "${{ steps.context.outputs.commits_b64 }}" | base64 -d)
          TICKET="${{ steps.ticket.outputs.issue_body_b64 }}" && TICKET=$(echo "$TICKET" | base64 -d)
          [ -z "$TICKET" ] && TICKET="${{ steps.context.outputs.ticket_b64 }}" && TICKET=$(echo "$TICKET" | base64 -d)
          [ -z "$TICKET" ] && TICKET="Задача не указана"
          
          # Формируем промпт
          PROMPT="Ты Senior Code Reviewer. Анализируй код строго по задаче.
          
🎯 ЗАДАЧА:
$TICKET

📝 КОММИТЫ:
$COMMITS

📄 ДИФФ:
$DIFF

📌 ИНСТРУКЦИЯ:
1. Соответствует ли код задаче?
2. Найди баги, уязвимости, проблемы производительности.
3. Предложи конкретные исправления с примерами.
4. Отвечай на русском, в Markdown. Не выдумывай файлы, которых нет в диффе."

          python3 << 'PYEOF'
import os, sys, json, urllib.request

api_key = os.environ["YANDEX_API_KEY"]
prompt = '''${PROMPT}'''

payload = json.dumps({
    "model": "yandexgpt/latest",
    "messages": [
        {"role": "system", "content": "Ты строгий code reviewer. Отвечай по делу, без воды."},
        {"role": "user", "content": prompt}
    ],
    "max_tokens": 2000,
    "temperature": 0.2
}).encode("utf-8")

req = urllib.request.Request(
    "https://llm.api.cloud.yandex.net/compatible-mode/v1/chat/completions",
    data=payload,
    headers={
        "Authorization": f"Api-Key {api_key}",
        "Content-Type": "application/json"
    },
    method="POST"
)

try:
    with urllib.request.urlopen(req, timeout=60) as resp:
        result = json.loads(resp.read().decode("utf-8"))
        review = result.get("choices", [{}])[0].get("message", {}).get("content", "Пустой ответ")
        
        review_escaped = review.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
        print(f"review={review_escaped}", file=open(os.environ["GITHUB_OUTPUT"], "a"))
except Exception as e:
    print(f"review=Ошибка: {str(e)}", file=open(os.environ["GITHUB_OUTPUT"], "a"))
    sys.exit(0)
PYEOF

      - name: Post Review
        uses: actions/github-script@v7
        with:
          script: |
            const review = decodeURIComponent(`${{ steps.llm.outputs.review }}`);
            const prNum = context.issue.number;
            const issueNum = `${{ steps.context.outputs.issue_num }}`;
            
            const body = `**YandexGPT Review**\n\n${review}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              body
            });
            
            if (issueNum && !isNaN(issueNum) && parseInt(issueNum) !== prNum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNum),
                body: ` **Review for PR №${prNum}**\n\n${review}`
              });
            }