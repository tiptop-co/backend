name: Claude Commit Review

on:
  push:
    branches:
      - demo-check-b

jobs:
  claude_commit_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install anthropic requests

      - name: Gather latest commits
        run: git log -n 5 --pretty=format:"%s%n%b" > commit_messages.txt

      - name: Run Claude review
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/llm_review.py \
              --commit-messages commit_messages.txt \
              --branch demo-check-b \
              --repo tiptop-co/backend