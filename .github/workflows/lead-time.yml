name: Lead Time Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  lead-time-dashboard:
    name: Collect & build dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect status time metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python lead-time-dashboard/collect_status_time.py \
            --org tiptop-co \
            --project-number 1 \
            --output lead-time-dashboard/metrics.json

      - name: Generate HTML dashboard
        run: |
          python lead-time-dashboard/generate_dashboard.py \
            --input  lead-time-dashboard/metrics.json \
            --output lead-time-dashboard/dashboard.html

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: lead-time-dashboard
          path: |
            lead-time-dashboard/dashboard.html
            lead-time-dashboard/metrics.json
          retention-days: 90

      - name: Write job summary
        run: |
          python3 - >> $GITHUB_STEP_SUMMARY << 'EOF2'
          import json
          with open("lead-time-dashboard/metrics.json") as f:
              d = json.load(f)
          items = d["items"]
          by_month = d["by_month"]
          all_lead = [i["total_lead_time_h"] for i in items if i.get("total_lead_time_h", 0) > 0]
          avg = sum(all_lead)/len(all_lead)/24 if all_lead else 0
          print("## 📊 Lead Time Dashboard")
          print(f"**Проект:** {d['project_title']}")
          print(f"**Задач:** {len(items)} | **Среднее Lead Time:** {avg:.1f} дн.")
          print()
          print("| Месяц | Задач | Avg Lead Time (дн.) |")
          print("|-------|-------|---------------------|")
          for m, s in sorted(by_month.items()):
              print(f"| {m} | {s['count']} | {s['avg_lead_time_days']} |")
          EOF2