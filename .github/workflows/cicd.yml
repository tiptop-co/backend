name: CICD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GO_VERSION: "1.26"
  BINARY_NAME: "service"
  BINARY_PATH: "./cmd/service"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1
          args: --config=.golangci.yml --timeout=5m

  
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./... || true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
   # if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
          -o ${{ env.BINARY_NAME }} ${{ env.BINARY_PATH }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    #if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download binary
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}

      - name: Make binary executable
        continue-on-error: true
        run: chmod +x ${{ env.BINARY_NAME }}

      - name: Copy binary to server
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: ${{ env.BINARY_NAME }}
          target: /opt/tiptop/

      - name: Restart service on server
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            # Остановить текущий сервис
            sudo systemctl stop tiptop || true
            # Заменить бинарник
            sudo mv /opt/tiptop/service /usr/local/bin/tiptop
            sudo chmod +x /usr/local/bin/tiptop
            # Запустить сервис
            sudo systemctl start tiptop
            # Проверить статус
            sudo systemctl is-active --quiet tiptop && echo "✅ Service started successfully" || (echo "❌ Service failed to start" && exit 1)
