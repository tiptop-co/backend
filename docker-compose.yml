services:
  postgres:
    image: postgres:17
    container_name: tiptop-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - tiptop_postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7
    container_name: tiptop-redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    # volumes: 
    #   - redis_data:/data
    command: redis-server --save "" --appendonly no --loglevel warning
    networks:
      - backend

volumes:
  tiptop_postgres_data:

networks:
  backend: